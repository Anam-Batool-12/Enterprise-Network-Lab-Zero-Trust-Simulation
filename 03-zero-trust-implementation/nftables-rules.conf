table inet zerotrust {
    chain forward {
        type filter hook forward priority 0; policy drop;

        # allow established/related traffic (replies to allowed connections)
        ct state established,related accept

        # VLAN10 (admin) -> VLAN20 (corp): allow SSH only
        iifname "br-vlan10" oifname "br-vlan20" tcp dport 22 accept

        # VLAN10 -> VLAN30 (IoT/CCTV): NO rule = falls through to drop below
        # this is Zero Trust: nothing is allowed unless explicitly stated

        # log every dropped packet — this becomes your research data
        log prefix "ZT-DROP: " counter drop
    }
}
